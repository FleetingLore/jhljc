site_name: 朴素集合论
site_url: https://ducia.site/psjhl

repo_url: https://github.com/fleetinglore/psjhl
repo_name: fleetinglore/psjhl

nav:
  - 目录: index.md
  - 第一章  集合:
    - 1.1  基本概念: 1/1.md
    - 1.2  子集关系: 1/2.md
    - 1.3  二元运算: 1/3.md
    - 1.4  运算律: 1/4.md

  - 第二章  取样:
    - 2.1  基本概念: 2/1.md
    - 2.2  运算结果的取样: 2/2.md
    - 2.3  函数: 2/3.md
    - 2.4  容斥原理: 2/4.md

  - 第三章  组合:
      # ...

  - 第四章  函数:
      # ...

  - 第五章  基数的相等关系:
      # ...

  - 第六章  朴素的维数观点:
      # ...

  - 第七章  基数的相等关系:
      # ...

  - 第八章  基数运算:
      # ...

  - 第九章  序:
      # ...

  - 第十章  有序集:
      # ...

  # 后面还有但我还没学到

theme:
  name: material
  palette:
    - scheme: default
      primary: custom
      accent: custom
  logo: assets/images/logo.svg
  favicon: assets/images/favicon.svg
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - toc.integrate

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - pymdownx.arithmatex:
      generic: true
  - attr_list
  - pymdownx.emoji
  - footnotes

extra_javascript:
  - javascripts/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
