site_name: 集合论基础
site_url: https://fleetinglore.github.io/jhljc

nav:
  - index: index.md
  - 第一章  集合及其基数:
    - 1. 集合: 1/1.md
    - 2. 基数: 1/2.md
    - 3. 相等基数: 1/3.md
    - 4. 可数集: 1/4.md
    - 5. Cantor-Bernstein 定理: 1/5.md
    - 6. Cantor 定理: 1/6.md
    - 7. 函数: 1/7.md
    - 8. 基数运算: 1/8.md

theme:
  name: material
  palette:
    - scheme: default
      primary: custom
      accent: custom
  logo: assets/images/logo.svg
  favicon: assets/images/favicon.svg
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - toc.integrate

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - pymdownx.arithmatex:
      generic: true
  - attr_list
  - pymdownx.emoji
  - footnotes

extra_javascript:
  - javascripts/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
