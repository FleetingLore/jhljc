site_name: 集合论基础
site_url: https://fleetinglore.github.io/jhljc

nav:
  - index: index.md
  - 第一章  集合及其基数:
    - 1. 集合: 1/1.md
    - 2. 基数: 1/2.md
    - 3. 相等基数: 1/3.md
    - 4. 可数集: 1/4.md

theme:
  name: material
  palette:
    # 亮色模式
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/toggle-switch-off-outline
        name: Switch to dark mode
    # 深色模式
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/toggle-switch
        name: Switch to light mode
  logo: assets/images/logo.svg
  favicon: assets/images/favicon.svg
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - toc.integrate

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - pymdownx.arithmatex:
      generic: true
  - attr_list
  - pymdownx.emoji # 可选：支持表情符号
  - footnotes # 可选：支持脚注

extra_javascript:
  - javascripts/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
