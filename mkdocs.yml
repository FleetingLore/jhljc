site_name: 朴素集合论
site_url: https://ducia.site/jhljc

repo_url: https://github.com/fleetinglore/jhljc
repo_name: fleetinglore/jhljc

nav:
  - 目录: index.md
  - 第一章  集合, 基数:
    - 1. 集合: 1/1.md
    - 2. 基数: 1/2.md
    - 3. 相等基数: 1/3.md
    - 4. 可数集: 1/4.md
    - 5. Cantor-Bernstein 定理: 1/5.md
    - 6. Cantor 定理: 1/6.md
    - 7. 函数: 1/7.md
    - 8. 基数运算: 1/8.md
  - 第二章  有序集:
    - 1. 等价关系和次序关系: 2/1.md
    - 2. 同构: 2/2.md
    - 3. 良基的次序: 2/3.md
    - 4. 良序集: 2/4.md
    - 5. 超限归纳: 2/5.md
    - 6. Zermelo 定理: 2/6.md
    - 7. 超限归纳与 Hamel 基: 2/7.md
    - 8. Zorn 引理及其运用: 2/8.md
    - 9. 重返基数运算: 2/9.md
    - 10. 序数: 2/10.md
    - 11. 序数算术: 2/11.md
    - 12. 递归定义和取幂: 2/12.md
    - 13. 序数的运用: 2/13.md

theme:
  name: material
  palette:
    - scheme: default
      primary: custom
      accent: custom
  logo: assets/images/logo.svg
  favicon: assets/images/favicon.svg
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - toc.integrate

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - pymdownx.arithmatex:
      generic: true
  - attr_list
  - pymdownx.emoji
  - footnotes

extra_javascript:
  - javascripts/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
